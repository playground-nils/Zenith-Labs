name: 'Unified CI: Compliance, File Correction, and Humor Bot'
'on':
  push:
    branches:
    - main
    - develop
    - earliest-critical
  pull_request:
    branches:
    - main
    - develop
  workflow_dispatch: null
permissions:
  contents: write
  id-token: write
  issues: read
  actions: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  BITHUB_AUDIT_DIR: .bithub/audit
  HUMOR_LOG: .bithub/logs/humor-bot.log
  OPA_POLICY_DIR: .bithub/policies
  OPA_RESULT_FILE: .bithub/audit/opa-result.json
  BITHUB_TRACE_FILE: .bithub/audit/humor-bot-trace.json
jobs:
  compliance-gate:
    name: "\U0001F6E1\uFE0F Policy & Compliance Gate"
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@v2.7.0
      with:
        egress-policy: audit
    - name: Validate Initiator and PR Content
      uses: actions/github-script@v7
      with:
        script: "//--- Policy 1: Approved Users Only ---\nconst allowedAuthors = ['trusted-dev1',\
          \ 'trusted-dev2', 'github-actions[bot]'];\nif (!allowedAuthors.includes(context.actor))\
          \ {\n  core.setFailed(`Unauthorized workflow initiator: '${context.actor}'.`);\n\
          \  return;\n}\nconsole.log(`\u2714 Authorized workflow initiator: '${context.actor}'.`);\n\
          \n//--- Policy 2: Prevent Prompt Injection in PRs ---\nconst prBody = process.env.PR_BODY\
          \ || '';\nconst blockedPatterns = [/ignore.*above/i, /break.*compliance/i,\
          \ /system prompt/i];\nif (blockedPatterns.some(pat => pat.test(prBody)))\
          \ {\n  core.setFailed('Potential prompt injection detected in PR body.');\n\
          \  return;\n}\nconsole.log('\u2714 PR body passed prompt injection scan.');\n"
  correct-files:
    name: "\U0001F527 Correct Files (${{ matrix.os }})"
    needs: compliance-gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
        - windows-latest
        - ubuntu-latest
        - macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install PowerShell (non-Windows)
      if: runner.os != 'Windows'
      uses: actions/setup-pwsh@v3
      with:
        version: latest
    - name: Run manifest-driven ALN corrections
      shell: pwsh
      run: "$ErrorActionPreference = 'Stop'\n$scriptsDir = Join-Path $env:GITHUB_WORKSPACE\
        \ 'scripts'\n$runnerScript = Join-Path $scriptsDir 'run-all-corrections.ps1'\n\
        \nif (-not (Test-Path $runnerScript)) {\n  throw \"Correction runner script\
        \ not found at '$runnerScript'\"\n}\n\n& $runnerScript\n"
    - name: Commit and Push Corrections (with retry)
      shell: bash
      run: "set -e\ngit config user.name \"ALN File Corrector Bot\"\ngit config user.email\
        \ \"actions@github.com\"\n\n# Add all changes and check if there's anything\
        \ to commit\ngit add .\nif git diff --cached --quiet; then\n  echo \"\u2714\
        \ No file changes to commit.\"\n  exit 0\nfi\n\ngit commit -m \"style: Automated\
        \ ALN file corrections\"\n\n# Retry loop to handle cases where the remote\
        \ branch was updated\nfor i in {1..3}; do\n  echo \"Attempt $i to push changes...\"\
        \n  # Pull with rebase to apply our commit on top of remote changes\n  if\
        \ git pull --rebase origin \"${GITHUB_REF_NAME}\"; then\n    if git push origin\
        \ \"${GITHUB_REF_NAME}\"; then\n      echo \"\u2714 Push successful!\"\n \
        \     exit 0\n    fi\n  fi\n  echo \"Push failed. Retrying in 10 seconds...\"\
        \n  sleep 10\ndone\n\necho \"::error::Failed to push changes after 3 attempts.\"\
        \nexit 1\n"
    - name: Upload Correction Audit Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: aln-correction-logs-${{ matrix.os }}
        path: 'scripts/audit-session.log

          scripts/log-*.txt

          '
        retention-days: 14
  humor-bot:
    name: "\U0001F916 Humor Bot AI Check"
    needs: compliance-gate
    runs-on: windows-latest
    steps:
    - name: Checkout repository (pinned to commit SHA)
      uses: actions/checkout@v4
      with:
        ref: ${{ github.sha }}
    - name: Set up PowerShell Core
      uses: actions/setup-pwsh@v3
      with:
        version: '7.4'
    - name: Install Humor Bot module
      shell: pwsh
      run: 'Set-PSRepository PSGallery -InstallationPolicy Trusted

        Install-Module -Name Posh-Humor -Force -Confirm:$false

        '
    - name: Run Humor Bot AI Script & Log
      shell: pwsh
      run: "$joke = \"Why was the AI so good at tennis? Because it had a great neural\
        \ net!\"\nWrite-Host \"\U0001F916 $joke\"\nNew-Item -ItemType Directory -Force\
        \ -Path (Split-Path \"${{ env.HUMOR_LOG }}\") | Out-Null\nAdd-Content -Path\
        \ \"${{ env.HUMOR_LOG }}\" -Value \"$(Get-Date -Format o) :: $joke\"\n"
    - name: Prepare Audit Directory and Write Trace
      shell: pwsh
      run: "New-Item -ItemType Directory -Force -Path \"${{ env.BITHUB_AUDIT_DIR }}\"\
        \ | Out-Null\n$trace = @{\n  schema    = \"bithub.trace.v1\"\n  component\
        \ = \"humor.bot\"\n  run_id    = \"${{ github.run_id }}\"\n  ref       = \"\
        ${{ github.ref }}\"\n  sha       = \"${{ github.sha }}\"\n  event     = \"\
        ${{ github.event_name }}\"\n  timestamp = (Get-Date).ToUniversalTime().ToString(\"\
        o\")\n  status    = \"completed\"\n} | ConvertTo-Json -Depth 5\n\n$trace |\
        \ Out-File -FilePath \"${{ env.BITHUB_TRACE_FILE }}\" -Encoding utf8\n"
    - name: OPA Gate (Placeholder)
      shell: pwsh
      run: '# This is a placeholder for your actual OPA evaluation command.

        # Example: opa eval --data "${{ env.OPA_POLICY_DIR }}" --input "${{ env.BITHUB_TRACE_FILE
        }}" "data.bithub.allow"

        Write-Host "::notice::OPA policy evaluation placeholder. Assuming pass."

        ''{"result":"pass"}'' | Out-File -FilePath "${{ env.OPA_RESULT_FILE }}" -Encoding
        utf8

        '
  escalate-on-failure:
    name: "\U0001F6A8 Escalate on Failure"
    needs:
    - correct-files
    - humor-bot
    if: failure()
    runs-on: ubuntu-latest
    steps:
    - name: Notify team of failure
      shell: pwsh
      run: 'Write-Host "::error::A job in the CI pipeline failed!"

        Write-Host "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{
        github.run_id }}"

        # In a real-world scenario, you would add steps here to:

        # - Create a Jira ticket

        # - Send a Slack/Teams message

        # - Page the on-call engineer

        '
