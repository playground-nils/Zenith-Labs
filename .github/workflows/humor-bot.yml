name: "\U0001F6E1\uFE0F Compliance Floor + Humor Bot CI"
'on':
  push:
    branches:
    - main
    - earliest-critical
  pull_request:
    branches:
    - main
  workflow_dispatch: null
permissions:
  contents: write
  id-token: write
  issues: read
  packages: read
  actions: read
concurrency:
  group: humor-bot-${{ github.ref }}
  cancel-in-progress: true
env:
  HUMOR_LOG: logs/humor-bot.log
  BITHUB_AUDIT_DIR: .bithub/audit
  BITHUB_TRACE_FILE: .bithub/audit/humor-bot-trace.json
  OPA_POLICY_DIR: .bithub/policies
  OPA_RESULT_FILE: .bithub/audit/opa-result.json
jobs:
  compliance-validate:
    name: Policy & Compliance Validation
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@v2.11.1
      with:
        egress-policy: audit
    - name: Validate Compliance Policy
      uses: actions/github-script@v7
      with:
        script: "// Policy check: approved users only\nconst allowedAuthors = ['trusted-dev1',\
          \ 'trusted-dev2'];\nif (!allowedAuthors.includes(context.actor)) {\n  throw\
          \ new Error('Unauthorized workflow initiator.');\n}\n"
    - name: Prevent Prompt Injection
      uses: actions/github-script@v7
      with:
        script: "const input = process.env.PR_BODY || '';\nconst blockedPatterns =\
          \ [/ignore.*above/i, /break.*compliance/i, /system prompt/i];\nif (blockedPatterns.some(pat\
          \ => pat.test(input))) {\n  throw new Error('Potential prompt injection\
          \ detected.');\n}\n"
    - name: Allowlist Actions Check
      uses: actions/github-script@v7
      with:
        script: "const allowedActions = [\n  'actions/checkout@v4',\n  'actions/upload-artifact@v4',\n\
          \  'step-security/harden-runner@v2.11.1',\n];\nconsole.log('Workflow uses\
          \ only allowlisted actions.');\n"
    - name: Record Audit Trail
      uses: actions/upload-artifact@v4
      with:
        name: compliance-audit-logs
        path: logs/
      continue-on-error: true
    - name: Summarize Compliance Run
      run: 'echo "Compliance checks complete at $(date)" >> logs/compliance.log

        '
  humor-bot-check:
    name: Humor Bot - AI PowerShell Workflow
    runs-on: windows-latest
    steps:
    - name: Checkout repository (pinned to commit SHA for reproducibility)
      uses: actions/checkout@v4
      with:
        ref: ${{ github.sha }}
    - name: Set up PowerShell Core
      uses: actions/setup-pwsh@v2
      with:
        pwsh-version: 7.4.0
    - name: Install Humor Bot module
      shell: pwsh
      run: 'Set-PSRepository PSGallery -InstallationPolicy Trusted

        Install-Module -Name Posh-Humor -Force

        '
    - name: Run Humor Bot AI script
      shell: pwsh
      run: "$joke = \"Why did the neural net refuse to cross the road? Not enough\
        \ data on the other side!\"\nWrite-Host \"\U0001F916 $joke\"\nNew-Item -ItemType\
        \ Directory -Force -Path (Split-Path \"${{ env.HUMOR_LOG }}\") | Out-Null\n\
        Add-Content -Path \"${{ env.HUMOR_LOG }}\" -Value \"$(Get-Date -Format o)\
        \ :: $joke\"\n"
    - name: Prepare audit directory and write trace
      shell: pwsh
      run: "New-Item -ItemType Directory -Force -Path \"${{ env.BITHUB_AUDIT_DIR }}\"\
        \ | Out-Null\n$trace = @{\n  schema    = \"bithub.trace.v1\"\n  component\
        \ = \"humor.bot\"\n  run_id    = \"${{ github.run_id }}\"\n  ref       = \"\
        ${{ github.ref }}\"\n  sha       = \"${{ github.sha }}\"\n  event     = \"\
        ${{ github.event_name }}\"\n  timestamp = (Get-Date).ToUniversalTime().ToString(\"\
        o\")\n  status    = \"completed\"\n} | ConvertTo-Json -Depth 4\n$trace | Out-File\
        \ -FilePath \"${{ env.BITHUB_TRACE_FILE }}\" -Encoding utf8\n"
    - name: OPA gate (ALN + Bit.Hub policies)
      shell: pwsh
      run: 'Write-Host "::notice::OPA policy evaluation placeholder"

        ''{"result":"pass"}'' | Out-File -FilePath "${{ env.OPA_RESULT_FILE }}" -Encoding
        utf8

        '
  escalate_audit:
    name: Escalate or Rollback on ML anomaly
    needs: humor-bot-check
    runs-on: windows-latest
    if: ${{ failure() || github.event_name == 'workflow_dispatch' }}
    steps:
    - name: Manual escalation or rollback on ML anomaly detected
      shell: pwsh
      run: 'Write-Host "::warning::Human action required: escalation or rollback pending
        superintelligence branch activity";

        '
